<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色宇宙 · 完整版</title>
    <style>
        /* ===== 全局重置 & 变量 ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0d1a;
            --surface: #1a1a2e;
            --surface-light: #2a2a44;
            --surface-hover: #3a3a5a;
            --text: #e8e8f0;
            --text-secondary: #9999b0;
            --border: #3a3a5a;
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --accent: #00d2d3;
            --danger: #ff6b6b;
            --success: #55efc4;
            --gold: #fdcb6e;
            --radius: 12px;
            --sidebar-width: 300px;
            --header-height: 52px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease, width 0.3s;
            overflow: hidden;
            height: 100vh;
            position: relative;
            z-index: 100;
        }
        .sidebar.collapsed {
            transform: translateX(-100%);
            width: 0;
        }
        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            height: var(--header-height);
        }
        .sidebar-header h2 {
            font-size: 18px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-header .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .sidebar-header .close-btn:hover { color: var(--text); }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px 20px;
        }
        .sidebar-scroll::-webkit-scrollbar { width: 4px; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* 折叠面板 */
        .accordion {
            margin-bottom: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface-light);
        }
        .accordion-header {
            padding: 8px 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background: var(--surface);
            transition: background 0.2s;
            font-size: 14px;
            font-weight: 600;
        }
        .accordion-header:hover { background: var(--surface-hover); }
        .accordion-header .arrow { transition: transform 0.3s; font-size: 12px; }
        .accordion-header .arrow.open { transform: rotate(180deg); }

        .accordion-body {
            padding: 10px 12px;
            display: none;
            flex-direction: column;
            gap: 8px;
            background: var(--surface);
            max-height: 400px;
            overflow-y: auto;
        }
        .accordion-body.open { display: flex; }
        .accordion-body::-webkit-scrollbar { width: 3px; }
        .accordion-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* 侧边栏内的列表和表单 */
        .item-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 6px;
        }
        .item-tag {
            background: var(--surface-hover);
            padding: 2px 12px;
            border-radius: 14px;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }
        .item-tag.active { border-color: var(--primary); background: var(--primary); }
        .item-tag .del { color: var(--text-secondary); cursor: pointer; font-size: 13px; }
        .item-tag .del:hover { color: var(--danger); }

        .small-form {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 4px;
        }
        .small-form .row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .small-form input, .small-form textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
            flex: 1;
            min-width: 60px;
        }
        .small-form input:focus, .small-form textarea:focus { border-color: var(--primary); outline: none; }
        .small-form textarea { resize: vertical; min-height: 40px; }
        .small-form button {
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--primary);
            color: white;
            white-space: nowrap;
        }
        .small-form button:hover { opacity: 0.85; }
        .small-form button.danger { background: var(--danger); }
        .small-form button.secondary { background: var(--surface-hover); color: var(--text); }

        .status-item, .timeline-item {
            background: var(--bg);
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-left: 3px solid var(--primary);
        }
        .status-item .actions, .timeline-item .actions {
            display: flex;
            gap: 4px;
        }
        .status-item .actions button, .timeline-item .actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
        }
        .status-item .actions button:hover { color: var(--text); }
        .status-item .actions button.del:hover { color: var(--danger); }

        /* ===== 主区域 ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
            overflow: hidden;
            position: relative;
        }

        /* 顶部栏 (含汉堡菜单) */
        .main-header {
            background: var(--surface);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            height: var(--header-height);
        }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 26px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .menu-btn:hover { color: var(--primary-light); }
        .main-header .info {
            display: flex;
            gap: 12px;
            font-size: 13px;
            overflow: hidden;
            flex-wrap: wrap;
        }
        .main-header .info .badge {
            background: var(--surface-light);
            padding: 2px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .main-header .info .badge.accent { background: var(--primary); }

        /* 状态摘要 + 故事进度条 */
        .summary-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 6px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            font-size: 12px;
            min-height: 44px;
        }
        .summary-bar .states {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .summary-bar .state-chip {
            background: var(--surface-light);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid var(--border);
        }
        .summary-bar .state-chip .val { color: var(--primary-light); font-weight: 600; }
        .summary-bar .progress {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            background: var(--surface-light);
            padding: 2px 12px;
            border-radius: 12px;
        }
        .summary-bar .progress .bar {
            width: 100px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        .summary-bar .progress .bar .fill {
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .summary-bar .progress .label { color: var(--text-secondary); font-size: 11px; }

        /* 聊天区域 */
        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #chatbox::-webkit-scrollbar { width: 4px; }
        #chatbox::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .message {
            max-width: 88%;
            padding: 8px 14px;
            border-radius: 14px;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
            font-size: 14px;
            line-height: 1.5;
        }
        .user-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--surface-light); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .ai-msg .role-label { font-size: 10px; color: var(--primary-light); font-weight: 600; margin-bottom: 2px; }
        .ai-msg.error { background: #3a1a1a; color: var(--danger); border-color: var(--danger); }
        .loading-dots::after { content: '...'; animation: dots 1.2s steps(4) infinite; }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .input-area {
            display: flex;
            padding: 8px 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            gap: 6px;
        }
        .input-area input {
            flex: 1;
            padding: 8px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .input-area input:focus { border-color: var(--primary); }
        .input-area input::placeholder { color: var(--text-secondary); }
        .input-area button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            padding: 0 18px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .input-area button:active { transform: scale(0.95); }
        .input-area button:disabled { opacity: 0.5; pointer-events: none; }

        .cmd-hint {
            font-size: 10px;
            color: var(--text-secondary);
            padding: 2px 14px;
            background: var(--bg);
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .cmd-hint span { background: var(--surface-light); padding: 0 8px; border-radius: 4px; font-size: 10px; }
        .footer {
            text-align: center;
            font-size: 10px;
            color: var(--text-secondary);
            padding: 3px 0;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--surface);
        }
        .footer a { color: var(--primary-light); text-decoration: none; }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .sidebar { position: fixed; top: 0; left: 0; height: 100vh; z-index: 200; box-shadow: 2px 0 20px rgba(0,0,0,0.6); }
            .sidebar.collapsed { transform: translateX(-100%); }
            .summary-bar .progress { margin-left: 0; width: 100%; justify-content: flex-start; }
            .summary-bar .progress .bar { flex: 1; }
            .main-header .info .badge { font-size: 11px; }
        }
        /* 遮罩层 */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 150;
        }
        .overlay.show { display: block; }
        @media (min-width: 701px) { .overlay { display: none !important; } }
    </style>
</head>
<body>

<!-- ===== 遮罩 ===== -->
<div class="overlay" id="overlay"></div>

<!-- ===== 侧边栏 ===== -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>🌌 控制台</h2>
        <button class="close-btn" id="closeSidebarBtn">✕</button>
    </div>
    <div class="sidebar-scroll">

        <!-- 1. 角色管理 -->
        <div class="accordion">
            <div class="accordion-header" data-target="acc-roles">
                <span>👤 角色</span>
                <span class="arrow">▼</span>
            </div>
            <div class="accordion-body open" id="acc-roles">
                <div class="item-list" id="role-list-side"></div>
                <div class="small-form">
                    <div class="row">
                        <input id="rf-name-side" placeholder="角色名" style="flex:2;">
                        <button id="new-role-side-btn">+ 新建</button>
                    </div>
                    <div class="row">
                        <input id="rf-tags-side" placeholder="标签 (逗号分隔)" style="flex:1;">
                    </div>
                    <textarea id="rf-bg-side" rows="2" placeholder="背景"></textarea>
                    <textarea id="rf-persona-side" rows="2" placeholder="性格/外貌"></textarea>
                    <textarea id="rf-special-side" rows="2" placeholder="特殊设定"></textarea>
                    <div class="row">
                        <button id="save-role-side-btn" class="primary">💾 保存</button>
                        <button id="delete-role-side-btn" class="danger">🗑️ 删除</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. 场景管理 -->
        <div class="accordion">
            <div class="accordion-header" data-target="acc-scenes">
                <span>🎭 场景/分支</span>
                <span class="arrow">▼</span>
            </div>
            <div class="accordion-body" id="acc-scenes">
                <div class="item-list" id="scene-list-side"></div>
                <div class="small-form">
                    <div class="row">
                        <input id="scene-name-side" placeholder="场景名" style="flex:2;">
                        <button id="new-scene-side-btn">+ 新建</button>
                    </div>
                    <textarea id="scene-desc-side" rows="2" placeholder="场景描述"></textarea>
                    <div class="row">
                        <input id="scene-tags-side" placeholder="标签" style="flex:1;">
                        <input id="scene-chars-side" placeholder="关联角色" style="flex:1;">
                    </div>
                    <textarea id="scene-notes-side" rows="2" placeholder="隐藏设定/伏笔"></textarea>
                    <div class="row">
                        <button id="save-scene-side-btn" class="primary">💾 保存</button>
                        <button id="delete-scene-side-btn" class="danger">🗑️ 删除</button>
                        <button id="snapshot-side-btn" class="secondary">📸 快照</button>
                        <button id="loadsnapshot-side-btn" class="secondary">📂 读档</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. 模拟器 -->
        <div class="accordion">
            <div class="accordion-header" data-target="acc-sims">
                <span>⚙️ 模拟器</span>
                <span class="arrow">▼</span>
            </div>
            <div class="accordion-body" id="acc-sims">
                <div class="item-list" id="sim-list-side"></div>
                <div class="small-form">
                    <div class="row">
                        <input id="sim-name-side" placeholder="模拟器名" style="flex:2;">
                        <button id="new-sim-side-btn">+ 新建</button>
                    </div>
                    <div class="row">
                        <button id="sim-type-style" class="secondary active" style="flex:1;">🎨 风格</button>
                        <button id="sim-type-world" class="secondary" style="flex:1;">🌍 世界观</button>
                    </div>
                    <textarea id="sim-desc-side" rows="2" placeholder="描述"></textarea>
                    <textarea id="sim-system-side" rows="3" placeholder="系统提示词/世界观规则"></textarea>
                    <textarea id="sim-ui-side" rows="2" placeholder="UI/交互特化描述"></textarea>
                    <div class="row">
                        <button id="save-sim-side-btn" class="primary">💾 保存</button>
                        <button id="delete-sim-side-btn" class="danger">🗑️ 删除</button>
                        <button id="apply-sim-side-btn" class="secondary">🚀 应用</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. 角色状态 -->
        <div class="accordion">
            <div class="accordion-header" data-target="acc-states">
                <span>📊 角色状态</span>
                <span class="arrow">▼</span>
            </div>
            <div class="accordion-body" id="acc-states">
                <div id="state-list-side"></div>
                <div class="small-form">
                    <div class="row">
                        <input id="state-key-side" placeholder="状态名 (如 好感度)" style="flex:1;">
                        <input id="state-val-side" placeholder="值 (如 75)" style="flex:1;">
                        <button id="add-state-side-btn">+ 添加</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5. 故事线 -->
        <div class="accordion">
            <div class="accordion-header" data-target="acc-timeline">
                <span>📖 故事线</span>
                <span class="arrow">▼</span>
            </div>
            <div class="accordion-body" id="acc-timeline">
                <div id="timeline-list-side"></div>
                <div class="small-form">
                    <div class="row">
                        <input id="tl-title-side" placeholder="节点标题" style="flex:1;">
                        <button id="add-tl-side-btn">+ 添加节点</button>
                    </div>
                    <textarea id="tl-desc-side" rows="2" placeholder="节点描述"></textarea>
                </div>
            </div>
        </div>

        <!-- 底部 API -->
        <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:8px;">
            <button id="reset-key-side-btn" style="background:var(--surface-hover);border:none;color:var(--text);padding:4px 12px;border-radius:6px;cursor:pointer;width:100%;font-size:12px;">🔑 更换 API Key</button>
        </div>
    </div>
</div>

<!-- ===== 主区域 ===== -->
<div class="main">
    <!-- 顶部栏 -->
    <div class="main-header">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="info">
            <span class="badge" id="main-role-badge">未选</span>
            <span class="badge accent" id="main-scene-badge">主线</span>
            <span class="badge" id="main-sim-badge" style="background:var(--surface-light);">无模拟器</span>
        </div>
        <div style="margin-left:auto; font-size:12px; color:var(--text-secondary);">
            <span id="main-tl-progress">0/0</span>
        </div>
    </div>

    <!-- 状态摘要 + 故事进度条 -->
    <div class="summary-bar" id="summary-bar">
        <div class="states" id="state-chips"></div>
        <div class="progress">
            <span class="label">故事进度</span>
            <div class="bar"><div class="fill" id="tl-progress-fill" style="width:0%;"></div></div>
            <span id="tl-progress-text">0%</span>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-wrapper">
        <div id="chatbox">
            <div class="ai-msg" style="align-self:center; color:var(--text-secondary); max-width:100%; background:transparent; border:none; font-size:13px;">
                🌟 选择角色和场景，开始你的故事
            </div>
        </div>
        <div class="cmd-hint">
            <span>/new 角色名</span> <span>/switch 角色</span> <span>/scene 描述</span>
            <span>/sim 模拟器名</span> <span>/clear</span> <span>/help</span>
        </div>
        <div class="input-area">
            <input id="user-input" placeholder="输入消息或 /指令..." autofocus>
            <button id="send-btn">发送</button>
        </div>
        <div class="footer">
            <span>数据本地存储 · </span>
            <a href="#" id="clear-all-link">清除所有数据</a>
        </div>
    </div>
</div>

<script>
// ============================================================
//  完整宇宙系统 v2.0 - 带侧边栏折叠 + 状态 + 故事线
// ============================================================

// ---------- 数据模型 ----------
const DEFAULT_DATA = {
    roles: {
        'default': {
            id: 'default',
            name: '默认助手',
            tags: '通用AI',
            background: '一个乐于助人的智能助手。',
            persona: '友好、耐心、知识渊博。',
            special: '',
            states: {},      // { "好感度": 75, "体力": 100 }
            history: []
        }
    },
    currentRoleId: 'default',
    scenes: {},
    currentSceneId: null,
    simulators: {},
    activeSimId: null
};

// ---------- 状态 ----------
let data = null;
let apiKey = '';

// ---------- DOM ----------
const $ = id => document.getElementById(id);
const chatbox = $('chatbox');
const userInput = $('user-input');
const sendBtn = $('send-btn');

// 侧边栏元素
const sidebar = $('sidebar');
const overlay = $('overlay');
const menuBtn = $('menuBtn');
const closeSidebarBtn = $('closeSidebarBtn');

// 角色相关
const roleListSide = $('role-list-side');
const rfNameSide = $('rf-name-side');
const rfTagsSide = $('rf-tags-side');
const rfBgSide = $('rf-bg-side');
const rfPersonaSide = $('rf-persona-side');
const rfSpecialSide = $('rf-special-side');

// 场景
const sceneListSide = $('scene-list-side');
const sceneNameSide = $('scene-name-side');
const sceneDescSide = $('scene-desc-side');
const sceneTagsSide = $('scene-tags-side');
const sceneCharsSide = $('scene-chars-side');
const sceneNotesSide = $('scene-notes-side');

// 模拟器
const simListSide = $('sim-list-side');
const simNameSide = $('sim-name-side');
const simDescSide = $('sim-desc-side');
const simSystemSide = $('sim-system-side');
const simUiSide = $('sim-ui-side');
const simTypeStyle = $('sim-type-style');
const simTypeWorld = $('sim-type-world');

// 状态
const stateListSide = $('state-list-side');
const stateKeySide = $('state-key-side');
const stateValSide = $('state-val-side');

// 故事线
const timelineListSide = $('timeline-list-side');
const tlTitleSide = $('tl-title-side');
const tlDescSide = $('tl-desc-side');

// 主区域标签
const mainRoleBadge = $('main-role-badge');
const mainSceneBadge = $('main-scene-badge');
const mainSimBadge = $('main-sim-badge');
const mainTlProgress = $('main-tl-progress');
const tlProgressFill = $('tl-progress-fill');
const tlProgressText = $('tl-progress-text');
const stateChips = $('state-chips');

// ---------- 数据持久化 ----------
function loadData() {
    try {
        const saved = localStorage.getItem('deepseek_universe_data');
        if (saved) {
            const parsed = JSON.parse(saved);
            data = parsed;
            if (!data.roles || !data.roles['default']) {
                data.roles = { 'default': { ...DEFAULT_DATA.roles['default'], id: 'default' } };
            }
            if (!data.currentRoleId || !data.roles[data.currentRoleId]) data.currentRoleId = 'default';
            if (!data.scenes) data.scenes = {};
            if (!data.simulators) data.simulators = {};
            // 确保每个角色有 states
            for (const id of Object.keys(data.roles)) {
                if (!data.roles[id].states) data.roles[id].states = {};
            }
            return true;
        }
    } catch (e) { console.warn('加载失败', e); }
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    // 确保默认角色有 states
    data.roles['default'].states = {};
    return false;
}

function saveData() {
    try { localStorage.setItem('deepseek_universe_data', JSON.stringify(data)); } catch (e) { console.warn('保存失败', e); }
}

function loadApiKey() {
    const saved = localStorage.getItem('deepseek_api_key');
    if (saved) { apiKey = saved; return true; }
    return false;
}
function saveApiKey(key) { apiKey = key; localStorage.setItem('deepseek_api_key', key); }

// ---------- 辅助 ----------
function getRole(id) { return data.roles[id]; }
function getCurrentRole() { return data.roles[data.currentRoleId] || data.roles['default']; }
function getScene(id) { return data.scenes[id]; }
function getCurrentScene() {
    const role = getCurrentRole();
    const defaultId = 'scene_' + role.id + '_default';
    if (!data.scenes[defaultId]) {
        data.scenes[defaultId] = {
            id: defaultId,
            name: '主线',
            desc: `与「${role.name}」的主线故事`,
            tags: '主线, 默认',
            characters: role.name,
            notes: '',
            timeline: [],   // [{ title, description, timestamp }]
            history: [],
            snapshots: []
        };
        saveData();
    }
    if (!data.currentSceneId || !data.scenes[data.currentSceneId]) {
        data.currentSceneId = defaultId;
    }
    return data.scenes[data.currentSceneId];
}
function getActiveSim() { return data.activeSimId ? data.simulators[data.activeSimId] : null; }

// ---------- 渲染侧边栏 ----------
function renderRoleList() {
    roleListSide.innerHTML = '';
    const ids = Object.keys(data.roles);
    for (const id of ids) {
        const r = data.roles[id];
        const tag = document.createElement('span');
        tag.className = 'item-tag' + (id === data.currentRoleId ? ' active' : '');
        tag.innerHTML = `${r.name || '未命名'}${id !== 'default' ? `<span class="del" data-id="${id}">✕</span>` : ''}`;
        tag.addEventListener('click', (e) => {
            if (e.target.classList.contains('del')) return;
            data.currentRoleId = id;
            data.currentSceneId = null; // 切换角色时重置场景
            saveData();
            renderAll();
        });
        const del = tag.querySelector('.del');
        if (del) del.addEventListener('click', (e) => { e.stopPropagation(); if (confirm(`删除「${r.name}」？`)) deleteRole(id); });
        roleListSide.appendChild(tag);
    }
    // 填充表单
    const role = getCurrentRole();
    rfNameSide.value = role.name || '';
    rfTagsSide.value = role.tags || '';
    rfBgSide.value = role.background || '';
    rfPersonaSide.value = role.persona || '';
    rfSpecialSide.value = role.special || '';
    mainRoleBadge.textContent = role.name || '未选';
}

function renderSceneList() {
    sceneListSide.innerHTML = '';
    const role = getCurrentRole();
    const sceneIds = Object.keys(data.scenes).filter(id => id.includes(role.id));
    if (sceneIds.length === 0) {
        const sid = 'scene_' + role.id + '_default';
        data.scenes[sid] = {
            id: sid, name: '主线', desc: `与「${role.name}」的故事`, tags: '主线', characters: role.name, notes: '',
            timeline: [], history: [], snapshots: []
        };
        data.currentSceneId = sid;
        saveData();
    }
    for (const id of sceneIds) {
        const s = data.scenes[id];
        const tag = document.createElement('span');
        tag.className = 'item-tag' + (id === data.currentSceneId ? ' active' : '');
        tag.innerHTML = `${s.name || '未命名'}${id !== 'scene_' + role.id + '_default' ? `<span class="del" data-id="${id}">✕</span>` : ''}`;
        tag.addEventListener('click', (e) => {
            if (e.target.classList.contains('del')) return;
            data.currentSceneId = id;
            saveData();
            renderAll();
        });
        const del = tag.querySelector('.del');
        if (del) del.addEventListener('click', (e) => { e.stopPropagation(); if (confirm(`删除场景「${s.name}」？`)) deleteScene(id); });
        sceneListSide.appendChild(tag);
    }
    const scene = getCurrentScene();
    sceneNameSide.value = scene.name || '';
    sceneDescSide.value = scene.desc || '';
    sceneTagsSide.value = scene.tags || '';
    sceneCharsSide.value = scene.characters || '';
    sceneNotesSide.value = scene.notes || '';
    mainSceneBadge.textContent = scene.name || '主线';
    // 更新故事线列表和进度
    renderTimelineList();
    updateProgress();
}

function renderSimList() {
    simListSide.innerHTML = '';
    const ids = Object.keys(data.simulators);
    for (const id of ids) {
        const s = data.simulators[id];
        const tag = document.createElement('span');
        tag.className = 'item-tag' + (id === data.activeSimId ? ' active' : '');
        tag.innerHTML = `${s.name || '未命名'} (${s.type === 'world' ? '🌍' : '🎨'})${id !== 'default_sim' ? `<span class="del" data-id="${id}">✕</span>` : ''}`;
        tag.addEventListener('click', (e) => {
            if (e.target.classList.contains('del')) return;
            data.activeSimId = (data.activeSimId === id) ? null : id;
            saveData();
            renderAll();
        });
        const del = tag.querySelector('.del');
        if (del) del.addEventListener('click', (e) => { e.stopPropagation(); if (confirm(`删除模拟器「${s.name}」？`)) deleteSim(id); });
        simListSide.appendChild(tag);
    }
    const active = getActiveSim();
    if (active) {
        simNameSide.value = active.name || '';
        simDescSide.value = active.desc || '';
        simSystemSide.value = active.systemPrompt || '';
        simUiSide.value = active.uiDesc || '';
        simTypeStyle.classList.toggle('active', active.type === 'style');
        simTypeWorld.classList.toggle('active', active.type === 'world');
        mainSimBadge.textContent = `模拟器: ${active.name}`;
    } else {
        simNameSide.value = '';
        simDescSide.value = '';
        simSystemSide.value = '';
        simUiSide.value = '';
        mainSimBadge.textContent = '无模拟器';
    }
}

function renderStateList() {
    const role = getCurrentRole();
    const states = role.states || {};
    stateListSide.innerHTML = '';
    for (const [key, val] of Object.entries(states)) {
        const div = document.createElement('div');
        div.className = 'status-item';
        div.innerHTML = `
            <span><strong>${key}</strong>: ${val}</span>
            <div class="actions">
                <button class="edit-state" data-key="${key}">✎</button>
                <button class="del del-state" data-key="${key}">✕</button>
            </div>
        `;
        const editBtn = div.querySelector('.edit-state');
        editBtn.addEventListener('click', () => {
            const newVal = prompt(`修改「${key}」的值:`, val);
            if (newVal !== null && newVal.trim() !== '') {
                role.states[key] = newVal.trim();
                saveData();
                renderAll();
            }
        });
        const delBtn = div.querySelector('.del-state');
        delBtn.addEventListener('click', () => {
            if (confirm(`删除状态「${key}」？`)) {
                delete role.states[key];
                saveData();
                renderAll();
            }
        });
        stateListSide.appendChild(div);
    }
    // 更新状态摘要卡片
    renderStateChips();
}

function renderStateChips() {
    const role = getCurrentRole();
    const states = role.states || {};
    stateChips.innerHTML = '';
    for (const [key, val] of Object.entries(states)) {
        const chip = document.createElement('span');
        chip.className = 'state-chip';
        chip.innerHTML = `${key}: <span class="val">${val}</span>`;
        stateChips.appendChild(chip);
    }
    if (Object.keys(states).length === 0) {
        stateChips.innerHTML = '<span style="color:var(--text-secondary);font-size:12px;">暂无状态</span>';
    }
}

function renderTimelineList() {
    const scene = getCurrentScene();
    const timeline = scene.timeline || [];
    timelineListSide.innerHTML = '';
    for (let i = 0; i < timeline.length; i++) {
        const item = timeline[i];
        const div = document.createElement('div');
        div.className = 'timeline-item';
        div.innerHTML = `
            <span><strong>${item.title}</strong> ${item.description ? '— ' + item.description : ''}</span>
            <div class="actions">
                <button class="edit-tl" data-idx="${i}">✎</button>
                <button class="del del-tl" data-idx="${i}">✕</button>
            </div>
        `;
        const editBtn = div.querySelector('.edit-tl');
        editBtn.addEventListener('click', () => {
            const newTitle = prompt('修改节点标题:', item.title);
            if (newTitle !== null && newTitle.trim() !== '') {
                const newDesc = prompt('修改节点描述:', item.description || '');
                timeline[i].title = newTitle.trim();
                timeline[i].description = newDesc !== null ? newDesc.trim() : '';
                saveData();
                renderAll();
            }
        });
        const delBtn = div.querySelector('.del-tl');
        delBtn.addEventListener('click', () => {
            if (confirm(`删除节点「${item.title}」？`)) {
                timeline.splice(i, 1);
                saveData();
                renderAll();
            }
        });
        timelineListSide.appendChild(div);
    }
    updateProgress();
}

function updateProgress() {
    const scene = getCurrentScene();
    const timeline = scene.timeline || [];
    const total = timeline.length;
    // 简单进度：以节点数计，最多显示100%
    const progress = total > 0 ? Math.min(100, (total / 20) * 100) : 0; // 假设20节点为完整
    tlProgressFill.style.width = progress + '%';
    tlProgressText.textContent = Math.round(progress) + '%';
    mainTlProgress.textContent = `${total} 个节点`;
}

// ---------- 渲染主聊天 ----------
function renderChat() {
    const role = getCurrentRole();
    const scene = getCurrentScene();
    const history = scene.history || [];
    chatbox.innerHTML = '';
    if (history.length === 0) {
        chatbox.innerHTML = `<div class="ai-msg" style="align-self:center; color:var(--text-secondary); max-width:100%; background:transparent; border:none; font-size:13px;">
            📖 「${scene.name}」· 与「${role.name}」的对话开始
        </div>`;
        return;
    }
    for (const msg of history) {
        const div = document.createElement('div');
        div.className = `message ${msg.role === 'user' ? 'user-msg' : 'ai-msg'}`;
        if (msg.role === 'assistant') {
            div.innerHTML = `<div class="role-label">${role.name}</div>` + (msg.content || '').replace(/\n/g, '<br>');
        } else {
            div.textContent = msg.content;
        }
        chatbox.appendChild(div);
    }
    scrollToBottom();
}

function renderAll() {
    renderRoleList();
    renderSceneList();
    renderSimList();
    renderStateList();
    renderTimelineList();
    renderChat();
}

// ---------- 角色 CRUD ----------
function createRole(name) {
    const id = 'role_' + Date.now();
    data.roles[id] = { id, name: name || '新角色', tags: '', background: '', persona: '', special: '', states: {}, history: [] };
    data.currentRoleId = id;
    data.currentSceneId = null;
    saveData();
    renderAll();
    return id;
}
function deleteRole(id) {
    if (id === 'default') { alert('不能删除默认角色'); return false; }
    delete data.roles[id];
    if (data.currentRoleId === id) data.currentRoleId = 'default';
    for (const sid of Object.keys(data.scenes)) {
        if (sid.includes(id)) delete data.scenes[sid];
    }
    data.currentSceneId = null;
    saveData();
    renderAll();
    return true;
}
function saveCurrentRole() {
    const role = getCurrentRole();
    role.name = rfNameSide.value.trim() || '未命名';
    role.tags = rfTagsSide.value.trim();
    role.background = rfBgSide.value.trim();
    role.persona = rfPersonaSide.value.trim();
    role.special = rfSpecialSide.value.trim();
    saveData();
    renderAll();
    alert('角色已保存！');
}

// ---------- 场景 CRUD ----------
function createScene(name) {
    const role = getCurrentRole();
    const id = 'scene_' + role.id + '_' + Date.now();
    data.scenes[id] = {
        id, name: name || '新场景', desc: '', tags: '', characters: role.name, notes: '',
        timeline: [], history: [], snapshots: []
    };
    data.currentSceneId = id;
    saveData();
    renderAll();
    return id;
}
function deleteScene(id) {
    const role = getCurrentRole();
    if (id === 'scene_' + role.id + '_default') { alert('不能删除主线场景'); return false; }
    delete data.scenes[id];
    if (data.currentSceneId === id) data.currentSceneId = null;
    saveData();
    renderAll();
    return true;
}
function saveCurrentScene() {
    const scene = getCurrentScene();
    scene.name = sceneNameSide.value.trim() || '未命名场景';
    scene.desc = sceneDescSide.value.trim();
    scene.tags = sceneTagsSide.value.trim();
    scene.characters = sceneCharsSide.value.trim();
    scene.notes = sceneNotesSide.value.trim();
    saveData();
    renderAll();
    alert('场景已保存！');
}
function saveSnapshot() {
    const scene = getCurrentScene();
    const snap = {
        id: 'snap_' + Date.now(),
        time: new Date().toLocaleString(),
        name: scene.name,
        desc: scene.desc,
        tags: scene.tags,
        characters: scene.characters,
        notes: scene.notes,
        history: JSON.parse(JSON.stringify(scene.history || [])),
        timeline: JSON.parse(JSON.stringify(scene.timeline || []))
    };
    if (!scene.snapshots) scene.snapshots = [];
    scene.snapshots.push(snap);
    saveData();
    alert('📸 快照已保存！');
}
function loadSnapshot() {
    const scene = getCurrentScene();
    if (!scene.snapshots || scene.snapshots.length === 0) { alert('没有快照'); return; }
    const list = scene.snapshots.map((s, i) => `${i+1}. ${s.time} - ${s.name}`).join('\n');
    const idx = prompt(`选择快照编号 (0取消):\n${list}`);
    if (idx === null || idx === '0') return;
    const num = parseInt(idx) - 1;
    if (isNaN(num) || num < 0 || num >= scene.snapshots.length) { alert('无效编号'); return; }
    const snap = scene.snapshots[num];
    scene.name = snap.name;
    scene.desc = snap.desc;
    scene.tags = snap.tags;
    scene.characters = snap.characters;
    scene.notes = snap.notes;
    scene.history = snap.history;
    scene.timeline = snap.timeline;
    saveData();
    renderAll();
    alert('📂 已加载快照！');
}

// ---------- 模拟器 CRUD ----------
function createSim(name, type = 'style') {
    const id = 'sim_' + Date.now();
    data.simulators[id] = { id, name: name || '新模拟器', type, desc: '', systemPrompt: '', uiDesc: '' };
    saveData();
    renderAll();
    return id;
}
function deleteSim(id) {
    delete data.simulators[id];
    if (data.activeSimId === id) data.activeSimId = null;
    saveData();
    renderAll();
}
function saveCurrentSim() {
    const id = data.activeSimId;
    if (!id || !data.simulators[id]) { alert('请先选择模拟器'); return; }
    const sim = data.simulators[id];
    sim.name = simNameSide.value.trim() || '未命名';
    sim.desc = simDescSide.value.trim();
    sim.systemPrompt = simSystemSide.value.trim();
    sim.uiDesc = simUiSide.value.trim();
    sim.type = simTypeStyle.classList.contains('active') ? 'style' : 'world';
    saveData();
    renderAll();
    alert('模拟器已保存！');
}
function applySimulator() {
    const id = data.activeSimId;
    if (!id || !data.simulators[id]) { alert('请先选择模拟器'); return; }
    saveCurrentSim();
    alert(`🚀 已应用「${data.simulators[id].name}」`);
}

// ---------- 状态操作 ----------
function addState() {
    const key = stateKeySide.value.trim();
    const val = stateValSide.value.trim();
    if (!key) { alert('请输入状态名'); return; }
    const role = getCurrentRole();
    role.states[key] = val || '';
    stateKeySide.value = '';
    stateValSide.value = '';
    saveData();
    renderAll();
}

// ---------- 故事线操作 ----------
function addTimelineNode() {
    const title = tlTitleSide.value.trim();
    const desc = tlDescSide.value.trim();
    if (!title) { alert('请输入节点标题'); return; }
    const scene = getCurrentScene();
    if (!scene.timeline) scene.timeline = [];
    scene.timeline.push({
        title: title,
        description: desc || '',
        timestamp: new Date().toLocaleString()
    });
    tlTitleSide.value = '';
    tlDescSide.value = '';
    saveData();
    renderAll();
    alert('📖 故事节点已添加！');
}

// ---------- 构建系统提示 ----------
function buildFullSystemPrompt() {
    const role = getCurrentRole();
    const scene = getCurrentScene();
    const sim = getActiveSim();
    const parts = [];

    parts.push(`# 角色设定`);
    parts.push(`你扮演的角色是「${role.name}」。`);
    if (role.tags) parts.push(`标签：${role.tags}`);
    if (role.background) parts.push(`背景：${role.background}`);
    if (role.persona) parts.push(`性格/外貌：${role.persona}`);
    if (role.special) parts.push(`特殊设定：${role.special}`);
    // 状态
    const states = role.states || {};
    if (Object.keys(states).length) {
        const stateStr = Object.entries(states).map(([k,v]) => `${k}: ${v}`).join('，');
        parts.push(`当前状态：${stateStr}`);
    }

    parts.push(`\n# 当前场景`);
    parts.push(`场景名称：${scene.name}`);
    if (scene.desc) parts.push(`场景描述：${scene.desc}`);
    if (scene.tags) parts.push(`场景标签：${scene.tags}`);
    if (scene.characters) parts.push(`关联角色：${scene.characters}`);
    if (scene.notes) parts.push(`隐藏设定：${scene.notes}`);

    if (sim) {
        parts.push(`\n# 模拟器模式：${sim.name} (${sim.type === 'world' ? '世界观RPG' : '风格模拟器'})`);
        if (sim.desc) parts.push(`描述：${sim.desc}`);
        if (sim.systemPrompt) parts.push(`\n${sim.systemPrompt}`);
        if (sim.uiDesc) parts.push(`交互风格：${sim.uiDesc}`);
    }

    parts.push('\n# 指令');
    parts.push('请完全代入角色，用符合角色设定和场景的语气回应。');
    parts.push('你可以推动剧情发展，创造新的场景元素。');
    if (sim && sim.type === 'world') {
        parts.push('这是一个完整的世界观RPG，请严格遵守世界规则，保持沉浸感。');
    }
    return parts.join('\n');
}

// ---------- 聊天 ----------
async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    if (text.startsWith('/')) {
        handleCommand(text);
        return;
    }

    if (!apiKey) { alert('请设置 API Key'); return; }

    const role = getCurrentRole();
    const scene = getCurrentScene();
    if (!scene.history) scene.history = [];

    scene.history.push({ role: 'user', content: text });
    appendMessage('user', text);
    userInput.value = '';
    userInput.focus();
    saveData();

    const loadingId = 'loading-' + Date.now();
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message ai-msg';
    loadingDiv.id = loadingId;
    loadingDiv.innerHTML = `<div class="role-label">${role.name}</div><span class="loading-dots">思考中</span>`;
    chatbox.appendChild(loadingDiv);
    scrollToBottom();
    sendBtn.disabled = true;

    try {
        const systemPrompt = buildFullSystemPrompt();
        const messages = [{ role: 'system', content: systemPrompt }];
        const hist = scene.history.slice(-30);
        for (const msg of hist) {
            messages.push({ role: msg.role, content: msg.content });
        }

        const resp = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({ model: 'deepseek-chat', messages, stream: false })
        });

        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();

        if (!resp.ok) {
            let err = `请求失败 (${resp.status})`;
            try { const e = await resp.json(); if (e.error?.message) err += `: ${e.error.message}`; } catch (e) {}
            throw new Error(err);
        }

        const data2 = await resp.json();
        const reply = data2.choices[0].message.content || '（无内容）';
        scene.history.push({ role: 'assistant', content: reply });
        appendMessage('ai', reply);
        saveData();

    } catch (error) {
        const loadingEl = document.getElementById(loadingId);
        if (loadingEl) loadingEl.remove();
        const errDiv = document.createElement('div');
        errDiv.className = 'message ai-msg error';
        errDiv.textContent = '❌ ' + error.message;
        chatbox.appendChild(errDiv);
        scrollToBottom();
        console.error(error);
    } finally {
        sendBtn.disabled = false;
    }
}

function appendMessage(type, content) {
    const role = getCurrentRole();
    const div = document.createElement('div');
    div.className = `message ${type === 'user' ? 'user-msg' : 'ai-msg'}`;
    if (type === 'assistant') {
        div.innerHTML = `<div class="role-label">${role.name}</div>` + (content || '').replace(/\n/g, '<br>');
    } else {
        div.textContent = content;
    }
    chatbox.appendChild(div);
    scrollToBottom();
}
function scrollToBottom() { chatbox.scrollTop = chatbox.scrollHeight; }

// ---------- 指令系统 ----------
function handleCommand(cmd) {
    const parts = cmd.slice(1).trim().split(/\s+/);
    const action = parts[0].toLowerCase();
    const arg = parts.slice(1).join(' ');

    switch (action) {
        case 'new':
            if (!arg) { alert('用法: /new 角色名'); return; }
            createRole(arg);
            alert(`已创建角色「${arg}」`);
            break;
        case 'switch':
        case 's':
            if (!arg) { alert('用法: /switch 角色名'); return; }
            const found = Object.values(data.roles).find(r => r.name === arg);
            if (found) { data.currentRoleId = found.id; data.currentSceneId = null; saveData(); renderAll(); }
            else alert(`未找到角色「${arg}」`);
            break;
        case 'del':
            if (!arg) { alert('用法: /del 角色名'); return; }
            const foundDel = Object.values(data.roles).find(r => r.name === arg);
            if (foundDel) deleteRole(foundDel.id);
            else alert(`未找到角色「${arg}」`);
            break;
        case 'scene':
            if (arg) {
                const scene = getCurrentScene();
                scene.desc = arg;
                scene.history = scene.history || [];
                scene.history.push({ role: 'assistant', content: `📌 场景更新：${arg}` });
                saveData();
                renderAll();
                alert('场景已更新！');
            } else alert('用法: /scene 场景描述');
            break;
        case 'sim':
            if (!arg) { alert('用法: /sim 模拟器名'); return; }
            const foundSim = Object.values(data.simulators).find(s => s.name === arg);
            if (foundSim) {
                data.activeSimId = (data.activeSimId === foundSim.id) ? null : foundSim.id;
                saveData();
                renderAll();
                alert(data.activeSimId ? `已激活「${arg}」` : `已停用「${arg}」`);
            } else alert(`未找到模拟器「${arg}」`);
            break;
        case 'clear':
            const scene2 = getCurrentScene();
            if (confirm(`清空「${scene2.name}」的对话？`)) {
                scene2.history = [];
                saveData();
                renderChat();
            }
            break;
        case 'help':
            alert(
                '📖 可用指令：\n' +
                '/new 角色名 - 创建角色\n' +
                '/switch 角色名 - 切换角色\n' +
                '/del 角色名 - 删除角色\n' +
                '/scene 描述 - 更新场景\n' +
                '/sim 模拟器名 - 切换模拟器\n' +
                '/clear - 清空对话\n' +
                '/help - 显示帮助'
            );
            break;
        default:
            alert(`未知指令: /${action}\n输入 /help 查看所有指令`);
    }
    userInput.value = '';
}

// ---------- 侧边栏控制 ----------
function toggleSidebar() {
    const isOpen = !sidebar.classList.contains('collapsed');
    sidebar.classList.toggle('collapsed');
    overlay.classList.toggle('show');
}
function closeSidebar() {
    if (window.innerWidth <= 700) {
        sidebar.classList.add('collapsed');
        overlay.classList.remove('show');
    }
}

menuBtn.addEventListener('click', toggleSidebar);
closeSidebarBtn.addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);
// 窗口尺寸变化时自动处理
window.addEventListener('resize', () => {
    if (window.innerWidth > 700) {
        sidebar.classList.remove('collapsed');
        overlay.classList.remove('show');
    } else {
        if (!sidebar.classList.contains('collapsed')) {
            // 如果侧边栏打开，但宽度小，默认收起？根据用户习惯，保持现状
        }
    }
});

// ---------- 折叠面板 ----------
document.querySelectorAll('.accordion-header').forEach(header => {
    header.addEventListener('click', () => {
        const targetId = header.dataset.target;
        const body = document.getElementById(targetId);
        if (!body) return;
        body.classList.toggle('open');
        const arrow = header.querySelector('.arrow');
        if (arrow) arrow.classList.toggle('open');
    });
});
// 默认展开角色和场景
document.querySelector('[data-target="acc-roles"] + .accordion-body')?.classList.add('open');
document.querySelector('[data-target="acc-roles"] .arrow')?.classList.add('open');
document.querySelector('[data-target="acc-scenes"] + .accordion-body')?.classList.add('open');
document.querySelector('[data-target="acc-scenes"] .arrow')?.classList.add('open');

// ---------- 事件绑定 ----------
// 角色
$('new-role-side-btn').addEventListener('click', () => {
    const name = prompt('输入新角色名称：');
    if (name && name.trim()) createRole(name.trim());
});
$('save-role-side-btn').addEventListener('click', saveCurrentRole);
$('delete-role-side-btn').addEventListener('click', () => {
    const role = getCurrentRole();
    if (role.id === 'default') { alert('不能删除默认角色'); return; }
    if (confirm(`确认删除「${role.name}」？`)) deleteRole(role.id);
});

// 场景
$('new-scene-side-btn').addEventListener('click', () => {
    const name = prompt('输入新场景名称：');
    if (name && name.trim()) createScene(name.trim());
});
$('save-scene-side-btn').addEventListener('click', saveCurrentScene);
$('delete-scene-side-btn').addEventListener('click', () => {
    const scene = getCurrentScene();
    const role = getCurrentRole();
    if (scene.id === 'scene_' + role.id + '_default') { alert('不能删除主线场景'); return; }
    if (confirm(`确认删除「${scene.name}」？`)) deleteScene(scene.id);
});
$('snapshot-side-btn').addEventListener('click', saveSnapshot);
$('loadsnapshot-side-btn').addEventListener('click', loadSnapshot);

// 模拟器
$('new-sim-side-btn').addEventListener('click', () => {
    const name = prompt('输入模拟器名称：');
    if (name && name.trim()) {
        const type = confirm('确定 → 世界观RPG，取消 → 风格模拟器') ? 'world' : 'style';
        createSim(name.trim(), type);
    }
});
$('save-sim-side-btn').addEventListener('click', saveCurrentSim);
$('delete-sim-side-btn').addEventListener('click', () => {
    const id = data.activeSimId;
    if (!id || !data.simulators[id]) { alert('请先选择模拟器'); return; }
    if (confirm(`删除「${data.simulators[id].name}」？`)) deleteSim(id);
});
$('apply-sim-side-btn').addEventListener('click', applySimulator);
simTypeStyle.addEventListener('click', () => {
    simTypeStyle.classList.add('active');
    simTypeWorld.classList.remove('active');
});
simTypeWorld.addEventListener('click', () => {
    simTypeWorld.classList.add('active');
    simTypeStyle.classList.remove('active');
});

// 状态
$('add-state-side-btn').addEventListener('click', addState);
stateKeySide.addEventListener('keydown', (e) => { if (e.key === 'Enter') addState(); });
stateValSide.addEventListener('keydown', (e) => { if (e.key === 'Enter') addState(); });

// 故事线
$('add-tl-side-btn').addEventListener('click', addTimelineNode);
tlTitleSide.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTimelineNode(); });

// API Key
$('reset-key-side-btn').addEventListener('click', () => {
    const key = prompt('输入 DeepSeek API Key (sk-开头):', apiKey || '');
    if (key && key.trim().startsWith('sk-')) { saveApiKey(key.trim()); alert('已更新'); }
    else if (key !== null && key !== '') alert('格式不正确');
});

// 清除所有数据
$('clear-all-link').addEventListener('click', (e) => {
    e.preventDefault();
    if (confirm('清除所有数据？')) {
        localStorage.removeItem('deepseek_universe_data');
        localStorage.removeItem('deepseek_api_key');
        apiKey = '';
        loadData();
        saveData();
        renderAll();
        alert('已清除');
    }
});

// 发送消息
userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
sendBtn.addEventListener('click', sendMessage);

// ---------- 初始化 ----------
function init() {
    loadData();
    loadApiKey();
    // 保证场景存在
    getCurrentScene();
    saveData();
    renderAll();
    if (!apiKey) {
        setTimeout(() => {
            const key = prompt('请输入 DeepSeek API Key (sk-开头):');
            if (key && key.trim().startsWith('sk-')) saveApiKey(key.trim());
        }, 500);
    }
    // 移动端默认收起侧边栏
    if (window.innerWidth <= 700) {
        sidebar.classList.add('collapsed');
        overlay.classList.remove('show');
    }
}
init();
console.log('🌌 角色宇宙 v2.0 已加载！');
</script>
