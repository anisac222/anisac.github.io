<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepSeek 角色聊天</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 850px;
        }
        /* 头部 */
        .header {
            background: #1a1a2e;
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header-actions button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 6px;
        }
        .header-actions button:hover { background: rgba(255,255,255,0.25); }

        /* 角色设定面板 - 可折叠 */
        .role-panel {
            background: #f0f2f5;
            padding: 10px 16px 16px;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        .role-panel .toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .role-panel .toggle span { font-weight: 500; color: #1a1a2e; }
        .role-panel .toggle .arrow { transition: transform 0.3s; font-size: 14px; }
        .role-panel .toggle .arrow.open { transform: rotate(180deg); }
        .role-content {
            display: none;
            margin-top: 10px;
            flex-direction: column;
            gap: 8px;
        }
        .role-content.open { display: flex; }
        .role-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }
        .role-content .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .role-content .presets button {
            background: #e9ecef;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .role-content .presets button:hover { background: #d1d5db; }
        .role-content .actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .role-content .actions button {
            padding: 6px 16px;
            border: none;
            border-radius: 8px;
            background: #007aff;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .role-content .actions button:active { transform: scale(0.95); }
        .role-content .actions .btn-secondary { background: #6c757d; }

        /* 聊天框 */
        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px;
            background: #f9fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        .user-msg {
            align-self: flex-end;
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-msg {
            align-self: flex-start;
            background: #e9ecef;
            color: #1e1e2a;
            border-bottom-left-radius: 4px;
        }
        .ai-msg.error { background: #ffe0e0; color: #b00020; }
        .loading-dots::after {
            content: '...';
            animation: dots 1.2s steps(4) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 输入区 */
        #input-area {
            display: flex;
            padding: 10px 14px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }
        #user-input:focus { border-color: #007aff; }
        #send-btn {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 0 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { opacity: 0.6; pointer-events: none; }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 6px 0;
            background: white;
            border-top: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
        .footer-note a { color: #007aff; text-decoration: none; }

        #chatbox::-webkit-scrollbar { width: 4px; }
        #chatbox::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>🤖 角色聊天</h1>
        <div class="header-actions">
            <button id="reset-key-btn">🔑 更换密钥</button>
        </div>
    </div>

    <!-- 角色设定面板 -->
    <div class="role-panel">
        <div class="toggle" id="role-toggle">
            <span>🎭 角色设定（点击展开）</span>
            <span class="arrow" id="role-arrow">▼</span>
        </div>
        <div class="role-content" id="role-content">
            <textarea id="system-prompt" placeholder="输入系统提示词，定义 AI 的角色..."></textarea>
            <div class="presets">
                <button data-preset="default">默认助手</button>
                <button data-preset="programmer">程序员</button>
                <button data-preset="poet">诗人</button>
                <button data-preset="psychologist">心理咨询师</button>
            </div>
            <div class="actions">
                <button id="save-role-btn">💾 保存设定</button>
                <button id="reset-role-btn" class="btn-secondary">↺ 恢复默认</button>
            </div>
        </div>
    </div>

    <!-- 聊天框 -->
    <div id="chatbox">
        <div class="ai-msg" style="align-self:center; color:#999; font-size:14px; max-width:100%; background:transparent;">
            👋 你好！设定角色后开始对话吧。
        </div>
    </div>

    <!-- 输入区 -->
    <div id="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." autofocus>
        <button id="send-btn">发送</button>
    </div>
    <div class="footer-note">
        <span>数据仅保存在本地 · </span>
        <a href="#" id="clear-storage-link">清除本地数据</a>
    </div>
</div>

<script>
    // ==========================================
    //  核心逻辑
    // ==========================================

    // DOM 引用
    const chatbox = document.getElementById('chatbox');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const resetKeyBtn = document.getElementById('reset-key-btn');
    const clearStorageLink = document.getElementById('clear-storage-link');

    // 角色相关
    const systemPromptTextarea = document.getElementById('system-prompt');
    const saveRoleBtn = document.getElementById('save-role-btn');
    const resetRoleBtn = document.getElementById('reset-role-btn');
    const roleToggle = document.getElementById('role-toggle');
    const roleContent = document.getElementById('role-content');
    const roleArrow = document.getElementById('role-arrow');

    // 状态
    let API_KEY = '';
    let currentSystemPrompt = 'You are a helpful assistant.';

    // ---------- 预设角色 ----------
    const PRESETS = {
        default: 'You are a helpful assistant.',
        programmer: '你是一名资深程序员，擅长用清晰、简洁的方式解释技术概念，并提供代码示例。',
        poet: '你是一位富有诗意的诗人，用优美、含蓄的语言表达情感和思想，回答充满文学性。',
        psychologist: '你是一位温暖、善解人意的心理咨询师，倾听问题，给予支持和共情的回应。'
    };

    // ---------- 角色设定管理 ----------
    function loadSystemPrompt() {
        const saved = localStorage.getItem('deepseek_system_prompt');
        if (saved) {
            currentSystemPrompt = saved;
            systemPromptTextarea.value = saved;
        } else {
            // 默认
            currentSystemPrompt = PRESETS.default;
            systemPromptTextarea.value = currentSystemPrompt;
            localStorage.setItem('deepseek_system_prompt', currentSystemPrompt);
        }
    }

    function saveSystemPrompt(prompt) {
        currentSystemPrompt = prompt;
        localStorage.setItem('deepseek_system_prompt', prompt);
        systemPromptTextarea.value = prompt;
        // 可选：显示提示
    }

    function resetSystemPrompt() {
        saveSystemPrompt(PRESETS.default);
        // 也可刷新界面
    }

    // 应用预设
    function applyPreset(presetKey) {
        const prompt = PRESETS[presetKey];
        if (prompt) {
            saveSystemPrompt(prompt);
        }
    }

    // ---------- API Key 管理 ----------
    function loadOrPromptKey() {
        const saved = localStorage.getItem('deepseek_api_key');
        if (saved) {
            API_KEY = saved;
            return true;
        } else {
            const key = prompt('请输入你的 DeepSeek API Key (以 sk- 开头):');
            if (key && key.trim().startsWith('sk-')) {
                API_KEY = key.trim();
                localStorage.setItem('deepseek_api_key', API_KEY);
                return true;
            } else if (key !== null) {
                alert('API Key 格式不正确，请以 sk- 开头。');
                return loadOrPromptKey();
            } else {
                alert('未输入 API Key，页面将无法正常工作。');
                return false;
            }
        }
    }

    function resetKey() {
        localStorage.removeItem('deepseek_api_key');
        API_KEY = '';
        const success = loadOrPromptKey();
        if (success) {
            alert('新密钥已保存！');
            chatbox.innerHTML = `<div class="ai-msg" style="align-self:center; color:#999; font-size:14px; max-width:100%; background:transparent;">
                🔑 密钥已更新，开始新对话吧。
            </div>`;
        } else {
            alert('未设置密钥，请刷新页面重试。');
        }
    }

    function clearAllData() {
        if (confirm('确认清除所有本地数据（API Key 和角色设定）？')) {
            localStorage.removeItem('deepseek_api_key');
            localStorage.removeItem('deepseek_system_prompt');
            API_KEY = '';
            loadSystemPrompt(); // 重置为默认
            chatbox.innerHTML = `<div class="ai-msg" style="align-self:center; color:#999; font-size:14px; max-width:100%; background:transparent;">
                🗑️ 本地数据已清除，请重新设置。
            </div>`;
            alert('已清除所有本地数据。');
            // 禁用发送按钮直到有 Key
            sendBtn.disabled = true;
            // 尝试重新加载 Key
            loadOrPromptKey();
            if (API_KEY) sendBtn.disabled = false;
        }
    }

    // ---------- 发送消息 ----------
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        if (!API_KEY) {
            alert('请先设置 API Key（点击右上角"更换密钥"）。');
            return;
        }

        // 获取当前系统提示（可能用户已修改文本域但未保存，我们使用已保存的 currentSystemPrompt）
        // 但为了实时性，也可以直接读取 textarea 的值，但保留保存机制，建议使用 currentSystemPrompt
        // 为方便，我们发送时使用 currentSystemPrompt（即保存的）
        const systemMsg = currentSystemPrompt;

        appendMessage('user', text);
        userInput.value = '';
        userInput.focus();

        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-msg';
        loadingDiv.id = loadingId;
        loadingDiv.innerHTML = '<span class="loading-dots">AI 正在思考</span>';
        chatbox.appendChild(loadingDiv);
        scrollToBottom();

        sendBtn.disabled = true;

        try {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: systemMsg },
                        { role: 'user', content: text }
                    ],
                    stream: false
                })
            });

            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();

            if (!response.ok) {
                let errorMsg = `请求失败 (${response.status})`;
                try {
                    const errData = await response.json();
                    if (errData.error && errData.error.message) {
                        errorMsg += `: ${errData.error.message}`;
                    }
                } catch (e) {}
                throw new Error(errorMsg);
            }

            const data = await response.json();
            const aiReply = data.choices[0].message.content || '（无内容）';
            appendMessage('ai', aiReply);

        } catch (error) {
            const loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.remove();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message ai-msg error';
            errorDiv.textContent = '❌ ' + error.message;
            chatbox.appendChild(errorDiv);
            scrollToBottom();
            console.error('API 调用错误:', error);
        } finally {
            sendBtn.disabled = false;
        }
    }

    // ---------- 辅助 ----------
    function appendMessage(type, content) {
        const div = document.createElement('div');
        div.className = `message ${type === 'user' ? 'user-msg' : 'ai-msg'}`;
        div.innerHTML = content.replace(/\n/g, '<br>');
        chatbox.appendChild(div);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ---------- 事件绑定 ----------
    // 输入框回车发送
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);
    resetKeyBtn.addEventListener('click', resetKey);
    clearStorageLink.addEventListener('click', (e) => {
        e.preventDefault();
        clearAllData();
    });

    // 角色面板折叠
    roleToggle.addEventListener('click', () => {
        const isOpen = roleContent.classList.toggle('open');
        roleArrow.classList.toggle('open', isOpen);
    });

    // 保存角色设定
    saveRoleBtn.addEventListener('click', () => {
        const newPrompt = systemPromptTextarea.value.trim();
        if (newPrompt) {
            saveSystemPrompt(newPrompt);
            alert('角色设定已保存！');
        } else {
            alert('提示词不能为空。');
        }
    });

    // 恢复默认
    resetRoleBtn.addEventListener('click', () => {
        resetSystemPrompt();
        alert('已恢复默认角色。');
    });

    // 预设按钮
    document.querySelectorAll('[data-preset]').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.preset;
            applyPreset(key);
            // 更新文本框显示
            systemPromptTextarea.value = currentSystemPrompt;
            alert(`已切换至「${btn.textContent}」角色。`);
        });
    });

    // ---------- 初始化 ----------
    window.onload = function() {
        // 加载角色设定
        loadSystemPrompt();
        // 加载 API Key
        const hasKey = loadOrPromptKey();
        if (!hasKey) {
            sendBtn.disabled = true;
            chatbox.innerHTML = `<div class="ai-msg" style="align-self:center; color:#b00020; max-width:100%; background:transparent;">
                ⚠️ 未设置 API Key，请点击右上角 "更换密钥" 输入。
            </div>`;
        } else {
            sendBtn.disabled = false;
        }
        // 默认展开角色面板（可选）
        // 默认折叠
        roleContent.classList.remove('open');
        roleArrow.classList.remove('open');
    };
</script>
</body>
</html>
